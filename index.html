            overflow: hidden;

            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;

            font-size: 2rem;
            color: var(--text-muted);
            cursor: pointer;

        .badge { font-size: 0.75rem; padding: 0.1rem 0.4rem; background: var(--primary); color: white; border-radius: 4px; margin-left: 0.5rem; }
