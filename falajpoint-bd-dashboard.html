        }

            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: left 0.5s;
            transform: skewX(-20deg);
        }

            transform: translateY(-5px);

            border-color: rgba(255,255,255,0.2);
            background: var(--surface-hover);
        }
        .card:hover::before { left: 150%; }

        .card-teaser { color: var(--text-muted); font-size: 0.95rem; line-height: 1.5; }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 100;

        }

            overflow-y: auto;
            padding: 2.5rem;
            position: relative;
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .modal-overlay.active .modal-content {

        }
        .close-btn {
            position: absolute;
            top: 1rem; right: 1.5rem;
            font-size: 2rem;
            color: var(--text-muted);
            cursor: pointer;
            background: none; border: none;
            transition: color 0.2s;

        .badge { font-size: 0.75rem; padding: 0.1rem 0.4rem; background: var(--primary); color: white; border-radius: 4px; margin-left: 0.5rem; }

    </style>
</head>

                        fullHtml: "<p><strong>Acknowledge their status:</strong> Start by validating their position as Oman's pioneer in PPR and their Sultan's Shield recognition. This builds immediate rapport.</p><p><strong>Target OPEX:</strong> Plastics manufacturing margins are highly sensitive to energy and raw material costs. Pitch your Water Treatment Advisory to optimize their extrusion cooling systems, which is a guaranteed pain point in Oman's summer.</p><p><strong>Vendor-neutral formulation:</strong> Emphasize that you don't sell masterbatches or resins. Your independent advisory on their chemical mix can lower their cost-per-meter without sacrificing the quality needed for export.</p><p><strong>Expand to Group:</strong> Use success at TPI to pitch broader advisory services to the entire Bin Hayl Group.</p>"
                    }
                },
                
                fullReport: {
                    step1: "Founded in 1998, TPI is the flagship company of the Bin Hayl Group and the first manufacturer of PPR pipes in Oman. They export to 25+ countries and hold the Sultan’s Shield for Industrial Excellence.",
                    step2: "MODERATE presence. Leadership is visible, with strong pride in national manufacturing achievements.",
                    step3: "Operating out of Rusayl Industrial Estate. Plastic pipe extrusion is highly energy and water intensive. Exporting demands rigorous product formulation and compliance.",
                    step4: [
                        {title: "Extrusion Cooling & Water Treatment", type: "HYPOTHESIS", detail: "Scaling or biological fouling in cooling systems directly impacts energy overhead and production speed."},
                        {title: "Chemical Formulation & Additives", type: "HYPOTHESIS", detail: "Relying purely on raw material suppliers for masterbatches and UV stabilizers can inflate costs."},
                        {title: "Export Regulatory Compliance", type: "EVIDENCED", detail: "Exporting to 25+ countries requires constant navigation of complex international material standards."}
                    ],
                    step5: "Water Treatment & Industrial Effluent Advisory, Formulation & Product-Development Feasibility, Chemical Compliance & Regulatory Advisory.",
                    step6: "Mohd Khawar (GM), Omar Al Bahri (GM), Saeed Khawar (Chairman).",
                    step7: "You run a world-class facility here at Rusayl. We help similar scale plastics manufacturers shave 5-8% off their cooling and energy OPEX through optimized water chemistry and independent formulation advisory. Worth a brief look?",
                    step8: "We are vendor-neutral. We don't sell water treatment chemicals or plastic resins—our only goal is optimizing your process, ensuring you get the absolute best efficiency out of your current suppliers."
                }
            }
        };

        const sectionIcons = {
            contactDetails: "📞",
            location: "📍",
            keyBottlenecks: "⚠️",
            keyContacts: "👥",
            visitProtocol: "🗓️",
            salesStrategy: "🎯"
        };
        const sectionTitles = {
            contactDetails: "Contact Details",
            location: "Location",
            keyBottlenecks: "Key Bottlenecks",
            keyContacts: "Key Contacts",
            visitProtocol: "Visit Protocol",
            salesStrategy: "Sales Strategy"
        };

        let currentCompany = null;

        function init() {
            const selector = document.getElementById('companySelector');
            for (const name in companiesData) {
                const opt = document.createElement('option');
                opt.value = name;
                opt.textContent = name;
                selector.appendChild(opt);
            }
            if (Object.keys(companiesData).length > 0) {
                renderCompany(Object.keys(companiesData)[0]);
            }
        }

        function renderCompany(name) {
            currentCompany = companiesData[name];
            const main = document.getElementById('dashboardView');
            
            let html = `
                <div class="company-header">
                    <h2>${currentCompany.name}</h2>
                    <div style="color: var(--text-muted); margin-bottom: 0.5rem; max-width: 800px; line-height: 1.5;">${currentCompany.snapshot}</div>
                    <div class="tags">
                        <span class="tag tag-industry">${currentCompany.industry}</span>
                        <span class="tag tag-high">Priority: ${currentCompany.priority}</span>
                        <span class="tag glass">Confidence: ${currentCompany.confidence}</span>
                    </div>
                </div>
                <div class="dashboard-grid">
            `;

            for (const [key, section] of Object.entries(currentCompany.sections)) {
                html += `
                    <div class="glass card" onclick="openModal('${key}')">
                        <div class="card-icon">${sectionIcons[key]}</div>
                        <h3 class="card-title">${sectionTitles[key]}</h3>
                        <div class="card-teaser">${section.teaser}</div>
                    </div>
                `;
            }

            html += `</div>
                <button class="report-btn" onclick="openFullReport()">View Full 8-Step Research Report</button>
            `;
            
            main.innerHTML = html;
        }

        function openModal(sectionKey) {
            const section = currentCompany.sections[sectionKey];
            document.getElementById('modalTitle').textContent = sectionTitles[sectionKey];
            
            let bodyHtml = '';
            
            if (section.fullHtml) {
                bodyHtml = section.fullHtml;
            } else if (section.items) {
                bodyHtml = section.items.map(item => `
                    <div class="bottleneck-item">
                        <h4>${item.title} <span class="badge">${item.type}</span></h4>
                        <div style="font-size:0.95rem; color:var(--text-muted)">${item.reasoning}</div>
                    </div>
                `).join('');
            } else if (section.people) {
                bodyHtml = section.people.map(p => `
                    <div class="contact-item">
                        <h4>#${p.rank} ${p.name} - ${p.title}</h4>
                        <div style="font-size:0.9rem; color:var(--text-muted); margin-bottom: 0.5rem">
                            <strong>Best Entry:</strong> ${p.bestEntry}
                        </div>
                        <div style="font-size:0.9rem; color:var(--text-muted)">${p.contactInfo}</div>
                    </div>
                `).join('');
            } else if (section.steps) {
                bodyHtml = `<ol style="padding-left:1rem">` + section.steps.map(s => `<li style="margin-bottom:1rem">${s}</li>`).join('') + `</ol>`;
            }

            document.getElementById('modalBody').innerHTML = bodyHtml;
            document.getElementById('modalOverlay').classList.add('active');
        }

        function openFullReport() {
            const rep = currentCompany.fullReport;
            document.getElementById('modalTitle').textContent = "Full 8-Step Research Report";
            
            let bodyHtml = `
                <h3 style="color:var(--accent); margin-top:0; font-size:1.2rem">1. Company Snapshot</h3>
                <p>${rep.step1}</p>
                <h3 style="color:var(--accent); font-size:1.2rem">2. LinkedIn Check</h3>
                <p>${rep.step2}</p>
                <h3 style="color:var(--accent); font-size:1.2rem">3. Deeper Research</h3>
                <p>${rep.step3}</p>
                <h3 style="color:var(--accent); font-size:1.2rem">4. Likely Bottlenecks</h3>
                ${rep.step4.map(b => `<div style="margin-bottom:0.8rem"><strong>${b.title} <span class="badge">${b.type}</span></strong><br><span style="color:var(--text-muted); font-size:0.95rem">${b.detail}</span></div>`).join('')}
                <h3 style="color:var(--accent); font-size:1.2rem">5. FalajPoint Fit</h3>
                <p>${rep.step5}</p>
                <h3 style="color:var(--accent); font-size:1.2rem">6. Who to Approach</h3>
                <p>${rep.step6}</p>
                <h3 style="color:var(--accent); font-size:1.2rem">7. Visit Opening Pitch</h3>
                <p style="padding:1rem; border-left:3px solid var(--primary); background:rgba(255,255,255,0.05); border-radius:4px"><em>"${rep.step7}"</em></p>
                <h3 style="color:var(--accent); font-size:1.2rem">8. Objection Handling</h3>
                <p style="padding:1rem; border-left:3px solid var(--primary); background:rgba(255,255,255,0.05); border-radius:4px"><em>"${rep.step8}"</em></p>
            `;
            
            document.getElementById('modalBody').innerHTML = bodyHtml;
            document.getElementById('modalOverlay').classList.add('active');
        }

        function closeModal(event) {
            if (event === true || event.target.id === 'modalOverlay') {
                document.getElementById('modalOverlay').classList.remove('active');
            }
        }

        // Close on Esc key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal(true);
            }
        });

        window.onload = init;
    </script>
</body>
</html>
